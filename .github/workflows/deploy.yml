name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # If package-lock.json is in a subfolder, add:
          # cache-dependency-path: YOUR_SUBFOLDER_NAME/package-lock.json

      - name: Install dependencies
        # This runs npm install inside the specific folder
        run: npm install
        working-directory: . # Change this to YOUR_SUBFOLDER_NAME if needed

      - name: Build
        run: npm run build
        working-directory: . # Change this to YOUR_SUBFOLDER_NAME if needed

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # This must point to where the 'build' folder actually is
          path: './build/' # Change to 'YOUR_SUBFOLDER_NAME/build/' if needed

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
